name: Daily News

on:
  schedule:
    - cron: '0 1 * * *'   # 09:00 UTC+8
    - cron: '0 6 * * *'   # 14:00 UTC+8
    - cron: '0 14 * * *'  # 22:00 UTC+8
  workflow_dispatch:  # 手动触发

jobs:
  run-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install requests schedule python-telegram-bot google-generativeai httpx
      
      - name: Run news script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cat > config_runtime.json << EOF
          {
            "telegram_bot_token": "${{ secrets.TELEGRAM_TOKEN }}",
            "telegram_chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}",
            "gemini_api_key": "${{ secrets.GEMINI_API_KEY }}",
            "news_categories": ["crypto"],
            "schedule_times": ["09:00", "14:00", "22:00"],
            "api_base_url": "https://ai.6551.io"
          }
          EOF
          python src/daily_news_mcp/daily_news_runner.py
