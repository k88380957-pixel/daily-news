name: Daily News

on:
  schedule:
    - cron: '0 1 * * *'   # 北京时间 09:00 (UTC 01:00)
    - cron: '0 6 * * *'   # 北京时间 14:00 (UTC 06:00)
    - cron: '0 14 * * *'  # 北京时间 22:00 (UTC 14:00)
  workflow_dispatch:      # 支持手动点击运行测试

env:
  # 显式开启 Node.js 24 运行环境，消除弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install requests httpx
      
      - name: Run news script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          cat > config_runtime.json << EOF
          {
            "telegram_bot_token": "${{ secrets.TELEGRAM_TOKEN }}",
            "telegram_chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}",
            "news_categories": ["crypto", "tech", "finance"],
            "api_base_url": "https://ai.6551.io"
          }
          EOF
          python src/daily_news_mcp/daily_news_runner.py
